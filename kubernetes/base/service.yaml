apiVersion: v1
kind: Service
metadata:
  name: ntp-server
  namespace: ntp-server
  labels:
    app: ntp-server
    app.kubernetes.io/name: ntp-server
    app.kubernetes.io/component: ntp
spec:
  # ClusterIP is enough; external NTP clients hit the node IP directly
  type: ClusterIP
  
  selector:
    app: ntp-server
  
  ports:
    - name: ntp
      port: 123
      targetPort: 123
      protocol: UDP
