# Deployment for Chrony NTP Server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntp-server
  namespace: ntp-server
  labels:
    app: ntp-server
    app.kubernetes.io/name: ntp-server
    app.kubernetes.io/component: ntp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ntp-server
  template:
    metadata:
      labels:
        app: ntp-server
        app.kubernetes.io/name: ntp-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9123"
    spec:
      # Use host networking so NTP is served directly on the node IP:123
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      # Service account for workload identity (if needed)
      serviceAccountName: ntp-server
      
      # Security context for the pod
      securityContext:
        runAsNonRoot: false  # Required for chrony to bind to port 123
        fsGroup: 101  # chrony group
      
      # Anti-affinity to spread pods across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - ntp-server
                topologyKey: kubernetes.io/hostname
      
      # Tolerations for dedicated NTP nodes (optional)
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "ntp"
          effect: "NoSchedule"
      
      containers:
        - name: chrony
          image: ntp-server:latest  # Will be replaced by Kustomize
          imagePullPolicy: IfNotPresent
          
          # Container ports
          ports:
            - name: ntp
              containerPort: 123
              protocol: UDP
          
          # Security context for container
          securityContext:
            capabilities:
              add:
                - SYS_TIME       # Required to set system clock
                - NET_BIND_SERVICE  # Required to bind to port 123
              drop:
                - ALL
            readOnlyRootFilesystem: false
          
          # Resource limits
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          
          # Volume mounts
          volumeMounts:
            - name: chrony-config
              mountPath: /etc/chrony/chrony.conf
              subPath: chrony.conf
              readOnly: true
            - name: chrony-data
              mountPath: /var/lib/chrony
            - name: chrony-logs
              mountPath: /var/log/chrony
          
          # Liveness probe - check if chrony is running
          livenessProbe:
            exec:
              command:
                - chronyc
                - tracking
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          
          # Readiness probe - check if chrony is synchronized
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "chronyc tracking | grep -q 'Leap status.*Normal'"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
      
      # Volumes
      volumes:
        - name: chrony-config
          configMap:
            name: chrony-config
        - name: chrony-data
          emptyDir: {}
        - name: chrony-logs
          emptyDir: {}
      
      # DNS policy
      dnsPolicy: ClusterFirst
      
      # Restart policy
      restartPolicy: Always
      
      # Termination grace period
      terminationGracePeriodSeconds: 30
