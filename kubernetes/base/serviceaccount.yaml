# ServiceAccount for NTP Server
# Used for workload identity in cloud environments
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ntp-server
  namespace: ntp-server
  labels:
    app: ntp-server
    app.kubernetes.io/name: ntp-server
  annotations:
    # Cloud-specific annotations will be patched by Kustomize overlays
    # AWS: eks.amazonaws.com/role-arn: <role-arn>
    # GCP: iam.gke.io/gcp-service-account: <sa-email>
