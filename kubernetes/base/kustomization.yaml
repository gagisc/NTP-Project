# Kustomize base configuration for NTP Server
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: ntp-server-base

# Common labels applied to all resources
commonLabels:
  app.kubernetes.io/name: ntp-server
  app.kubernetes.io/part-of: ntp-pool
  app.kubernetes.io/managed-by: kustomize

# Resources to include
resources:
  - namespace.yaml
  - configmap.yaml
  - serviceaccount.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  - pdb.yaml

# Image configuration - will be overridden in overlays
images:
  - name: ntp-server
    newName: ntp-server
    newTag: latest

# Config map generator (alternative to static configmap)
# Uncomment to use generator instead of static file
# configMapGenerator:
#   - name: chrony-config
#     files:
#       - chrony.conf
