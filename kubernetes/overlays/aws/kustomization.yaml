# Kustomize overlay for AWS EKS deployment
#
# Quick modification guide:
#   - Image repo: edit params.env (AWS_ACCOUNT_ID, AWS_REGION)
#   - EIP allocation: edit params.env (EIP_ALLOCATION_ID)
#   - Replica count: edit the replicas block below
#   - NLB annotations: edit the patches block below
#
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: ntp-server-aws

resources:
  - ../../base

namespace: ntp-server

commonLabels:
  cloud-provider: aws
  environment: production

commonAnnotations:
  cloud.provider: aws

# params.env holds runtime values (generated by CI or deploy script, gitignored).
# Copy params.env.example to params.env and fill in your values before running
# kubectl apply -k kubernetes/overlays/aws
configMapGenerator:
  - name: aws-overlay-params
    envs:
      - params.env
    options:
      disableNameSuffixHash: true

# Replacements wire params ConfigMap values into image names and annotations.
replacements:
  - source:
      kind: ConfigMap
      name: aws-overlay-params
      fieldPath: data.ECR_IMAGE
    targets:
      - select:
          kind: Deployment
          name: ntp-server
        fieldPaths:
          - spec.template.spec.containers.[name=chrony].image
  - source:
      kind: ConfigMap
      name: aws-overlay-params
      fieldPath: data.EIP_ALLOCATION_ID
    targets:
      - select:
          kind: Service
          name: ntp-server
        fieldPaths:
          - metadata.annotations.[service.beta.kubernetes.io/aws-load-balancer-eip-allocations]

patches:
  - target:
      kind: Service
      name: ntp-server
    patch: |-
      - op: replace
        path: /spec/type
        value: LoadBalancer
      - op: add
        path: /spec/externalTrafficPolicy
        value: Local
      - op: add
        path: /metadata/annotations/service.beta.kubernetes.io~1aws-load-balancer-type
        value: external
      - op: add
        path: /metadata/annotations/service.beta.kubernetes.io~1aws-load-balancer-nlb-target-type
        value: ip
      - op: add
        path: /metadata/annotations/service.beta.kubernetes.io~1aws-load-balancer-scheme
        value: internet-facing
      - op: add
        path: /metadata/annotations/service.beta.kubernetes.io~1aws-load-balancer-cross-zone-load-balancing-enabled
        value: "true"
      - op: add
        path: /metadata/annotations/service.beta.kubernetes.io~1aws-load-balancer-healthcheck-protocol
        value: TCP
      - op: add
        path: /metadata/annotations/service.beta.kubernetes.io~1aws-load-balancer-eip-allocations
        value: PLACEHOLDER

replicas:
  - name: ntp-server
    count: 2
