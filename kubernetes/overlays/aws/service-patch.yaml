# AWS-specific Service patch for NLB with Elastic IP
# This file contains additional patches that can be applied manually
# Use: kubectl patch service ntp-server -n ntp-server --patch-file service-patch.yaml

apiVersion: v1
kind: Service
metadata:
  name: ntp-server
  namespace: ntp-server
  annotations:
    # AWS Load Balancer Controller annotations
    service.beta.kubernetes.io/aws-load-balancer-type: external
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    
    # Cross-zone load balancing for better distribution
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    
    # Health check configuration
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: TCP
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-port: "123"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-interval: "10"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-healthy-threshold: "2"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-unhealthy-threshold: "2"
    
    # Elastic IP allocation - REPLACE WITH YOUR EIP ALLOCATION ID
    # Get this from Terraform output: terraform output ntp_eip_allocation_id
    # service.beta.kubernetes.io/aws-load-balancer-eip-allocations: eipalloc-xxxxxxxxxxxxxxxxx
    
    # Subnets for NLB - REPLACE WITH YOUR SUBNET IDS (optional, auto-detected if tagged)
    # service.beta.kubernetes.io/aws-load-balancer-subnets: subnet-xxx,subnet-yyy
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
