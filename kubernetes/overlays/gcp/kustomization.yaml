# Kustomize overlay for GCP GKE deployment
#
# Quick modification guide:
#   - Image repo: edit params.env (AR_IMAGE)
#   - Static IP name: edit params.env (STATIC_IP_NAME)
#   - Workload Identity SA: edit params.env (GCP_WORKLOAD_SA)
#   - Replica count: edit the replicas block below
#   - LB annotations: edit the patches block below
#
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: ntp-server-gcp

resources:
  - ../../base

namespace: ntp-server

commonLabels:
  cloud-provider: gcp
  environment: production

commonAnnotations:
  cloud.provider: gcp

# params.env holds runtime values (generated by CI or deploy script, gitignored).
# Copy params.env.example to params.env and fill in your values before running
# kubectl apply -k kubernetes/overlays/gcp
configMapGenerator:
  - name: gcp-overlay-params
    envs:
      - params.env
    options:
      disableNameSuffixHash: true

# Replacements wire params ConfigMap values into image name, annotations, and SA.
replacements:
  - source:
      kind: ConfigMap
      name: gcp-overlay-params
      fieldPath: data.AR_IMAGE
    targets:
      - select:
          kind: Deployment
          name: ntp-server
        fieldPaths:
          - spec.template.spec.containers.[name=chrony].image
  - source:
      kind: ConfigMap
      name: gcp-overlay-params
      fieldPath: data.STATIC_IP_NAME
    targets:
      - select:
          kind: Service
          name: ntp-server
        fieldPaths:
          - metadata.annotations.[networking.gke.io/load-balancer-ip-addresses]
  - source:
      kind: ConfigMap
      name: gcp-overlay-params
      fieldPath: data.GCP_WORKLOAD_SA
    targets:
      - select:
          kind: ServiceAccount
          name: ntp-server
        fieldPaths:
          - metadata.annotations.[iam.gke.io/gcp-service-account]

patches:
  - target:
      kind: Service
      name: ntp-server
    patch: |-
      - op: replace
        path: /spec/type
        value: LoadBalancer
      - op: add
        path: /spec/externalTrafficPolicy
        value: Local
      - op: add
        path: /metadata/annotations/cloud.google.com~1l4-rbs
        value: enabled
      - op: add
        path: /metadata/annotations/networking.gke.io~1load-balancer-type
        value: External
      - op: add
        path: /metadata/annotations/networking.gke.io~1load-balancer-ip-addresses
        value: PLACEHOLDER

replicas:
  - name: ntp-server
    count: 2
