# Docker Compose for local testing of NTP server
# Use this for development and testing before deploying to Kubernetes

version: '3.8'

services:
  ntp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ntp-server
    restart: unless-stopped
    
    # Required capabilities for NTP server
    cap_add:
      - SYS_TIME
      - NET_BIND_SERVICE
    
    # Expose NTP port
    ports:
      - "123:123/udp"
    
    # Persistent storage for drift file
    volumes:
      - chrony-data:/var/lib/chrony
      - chrony-logs:/var/log/chrony
    
    # Health check
    healthcheck:
      test: ["CMD", "chronyc", "tracking"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # Environment variables (optional)
    environment:
      - TZ=UTC
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M

volumes:
  chrony-data:
  chrony-logs:
