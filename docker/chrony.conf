# Chrony configuration for pool.ntp.org server
# This configuration follows pool.ntp.org guidelines:
# - Uses statically chosen upstream servers (NOT pool.ntp.org aliases)
# - No LOCAL clock driver
# - noquery restriction for management queries
# - 5 upstream Stratum 1/2 servers

# ============================================
# Upstream NTP Servers (Stratum 1/2)
# ============================================
# These are manually selected, reliable Stratum 1/2 servers
# Do NOT use *.pool.ntp.org aliases as per pool.ntp.org guidelines

# NIST Time Servers (USA)
server time.nist.gov iburst prefer
server time-a-g.nist.gov iburst
server time-b-g.nist.gov iburst

# US Naval Observatory (USA)
server tick.usno.navy.mil iburst

# PTB Germany (Europe)
server ptbtime1.ptb.de iburst

# ============================================
# Server Configuration
# ============================================

# Allow NTP client access from anywhere (required for pool.ntp.org)
allow all

# Serve time even when not synchronized (with high stratum)
# This is disabled per pool.ntp.org guidelines - NO local clock
# local stratum 10  # DO NOT ENABLE

# ============================================
# Drift and Logging
# ============================================

# Record the rate at which the system clock gains/losses time
driftfile /var/lib/chrony/drift

# Allow the system clock to be stepped in the first three updates
# if its offset is larger than 1 second
makestep 1.0 3

# Enable kernel synchronization of the real-time clock (RTC)
rtcsync

# ============================================
# Security Restrictions
# ============================================

# Disable management queries from remote hosts (pool.ntp.org requirement)
# Only allow queries from localhost
cmdallow 127.0.0.1
cmdallow ::1

# Bind command socket to localhost only
bindcmdaddress 127.0.0.1
bindcmdaddress ::1

# ============================================
# Logging
# ============================================

# Log statistics and measurements
log tracking measurements statistics

# Log files directory
logdir /var/log/chrony

# ============================================
# Stratum Configuration
# ============================================

# Maximum stratum to allow (prevents serving if too far from reference)
# Pool servers can be stratum 3 or 4, but we aim for stratum 2-3
maxupdateskew 100.0

# Minimum number of selectable sources required to update the clock
minsources 3

# ============================================
# Hardware Timestamping (if available)
# ============================================

# Enable hardware timestamping on all interfaces that support it
# Uncomment if your network interface supports hardware timestamping
# hwtimestamp *
