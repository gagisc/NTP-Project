name: Deploy AWS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Terraform environment directory"
        required: true
        default: "aws-us-east-1"
        type: choice
        options:
          - aws-us-east-1
          - aws-ec2-ntp
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  contents: read
  id-token: write  # Required for OIDC auth to AWS

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_ENV: ${{ github.event.inputs.environment }}

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action }} (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: terraform/environments/${{ github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET_AWS }}" \
            -backend-config="key=ntp-server/${{ env.TF_ENV }}/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE_AWS }}" \
            -backend-config="encrypt=true"

      - name: Write tfvars from secrets
        run: |
          cat > terraform.tfvars <<EOF
          region              = "${{ secrets.AWS_REGION }}"
          cluster_name        = "${{ secrets.AWS_CLUSTER_NAME }}"
          kubernetes_version  = "1.29"
          vpc_cidr            = "10.0.0.0/16"
          availability_zones  = ["${{ secrets.AWS_REGION }}a", "${{ secrets.AWS_REGION }}b"]
          node_instance_types = ["t3.medium"]
          node_desired_size   = 2
          node_min_size       = 2
          node_max_size       = 10
          EOF

      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan -input=false

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve -input=false tfplan

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve -input=false

  docker-build-push:
    name: Build & Push Docker Image to ECR
    runs-on: ubuntu-latest
    needs: terraform
    if: github.event.inputs.action == 'apply'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repository if missing
        run: |
          aws ecr describe-repositories --repository-names ntp-server 2>/dev/null || \
            aws ecr create-repository --repository-name ntp-server

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to ECR
        uses: docker/build-push-action@v5
        with:
          context: docker
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/ntp-server:latest
            ${{ steps.login-ecr.outputs.registry }}/ntp-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-k8s:
    name: Deploy Kubernetes Manifests (AWS)
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event.inputs.action == 'apply'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "${{ secrets.AWS_REGION }}" \
            --name "${{ secrets.AWS_CLUSTER_NAME }}"

      - name: Install kustomize
        run: |
          curl -sSLo /tmp/kustomize.tar.gz \
            https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.3.0/kustomize_v5.3.0_linux_amd64.tar.gz
          tar -xf /tmp/kustomize.tar.gz -C /usr/local/bin
          chmod +x /usr/local/bin/kustomize

      - name: Get Terraform outputs
        id: tf-outputs
        working-directory: terraform/environments/${{ github.event.inputs.environment }}
        run: |
          terraform init -backend=false
          EIP_ID=$(terraform output -raw ntp_eip_allocation_id)
          echo "eip_id=$EIP_ID" >> "$GITHUB_OUTPUT"

      - name: Deploy to EKS via Kustomize (params.env)
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EIP_ID: ${{ steps.tf-outputs.outputs.eip_id }}
        run: |
          OVERLAY_TMP="$(mktemp -d)"
          cp -r kubernetes/overlays/aws/. "$OVERLAY_TMP/"
          cat > "$OVERLAY_TMP/params.env" <<EOF
          ECR_IMAGE=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/ntp-server:${{ github.sha }}
          EIP_ALLOCATION_ID=${EIP_ID}
          EOF
          sed -i 's/^[[:space:]]*//' "$OVERLAY_TMP/params.env"
          kubectl apply -k "$OVERLAY_TMP"

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/ntp-server -n ntp-server --timeout=300s
