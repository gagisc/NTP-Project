name: Deploy GCP

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Terraform environment directory"
        required: true
        default: "gcp-us-central1"
        type: choice
        options:
          - gcp-us-central1
          - gcp-k3s-ntp
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  contents: read
  id-token: write  # Required for OIDC auth to GCP

env:
  TF_ENV: ${{ github.event.inputs.environment }}

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action }} (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: terraform/environments/${{ github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET_GCP }}" \
            -backend-config="prefix=ntp-server/${{ env.TF_ENV }}"

      - name: Write tfvars from secrets
        run: |
          cat > terraform.tfvars <<EOF
          project_id          = "${{ secrets.GCP_PROJECT_ID }}"
          region              = "${{ secrets.GCP_REGION }}"
          cluster_name        = "${{ secrets.GCP_CLUSTER_NAME }}"
          node_count_per_zone = 1
          node_min_count      = 1
          node_max_count      = 5
          machine_type        = "e2-medium"
          EOF

      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan -input=false

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve -input=false tfplan

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve -input=false

  docker-build-push:
    name: Build & Push Docker Image to Artifact Registry
    runs-on: ubuntu-latest
    needs: terraform
    if: github.event.inputs.action == 'apply'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ secrets.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Create AR repository if missing
        run: |
          gcloud artifacts repositories describe ntp-server \
            --location="${{ secrets.GCP_REGION }}" 2>/dev/null || \
          gcloud artifacts repositories create ntp-server \
            --repository-format=docker \
            --location="${{ secrets.GCP_REGION }}" \
            --description="NTP Server container images"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to Artifact Registry
        uses: docker/build-push-action@v5
        with:
          context: docker
          push: true
          tags: |
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ntp-server/ntp-server:latest
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ntp-server/ntp-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-k8s:
    name: Deploy Kubernetes Manifests (GCP)
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event.inputs.action == 'apply'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GCP_CLUSTER_NAME }}
          location: ${{ secrets.GCP_REGION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Install kustomize
        run: |
          curl -sSLo /tmp/kustomize.tar.gz \
            https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.3.0/kustomize_v5.3.0_linux_amd64.tar.gz
          tar -xf /tmp/kustomize.tar.gz -C /usr/local/bin
          chmod +x /usr/local/bin/kustomize

      - name: Get static IP name from Terraform
        id: tf-outputs
        working-directory: terraform/environments/${{ github.event.inputs.environment }}
        run: |
          terraform init -backend=false
          STATIC_IP_NAME=$(terraform output -raw ntp_static_ip_name 2>/dev/null || echo "")
          echo "static_ip_name=$STATIC_IP_NAME" >> "$GITHUB_OUTPUT"

      - name: Deploy to GKE via Kustomize (params.env)
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_CLUSTER_NAME: ${{ secrets.GCP_CLUSTER_NAME }}
          STATIC_IP_NAME: ${{ steps.tf-outputs.outputs.static_ip_name }}
        run: |
          OVERLAY_TMP="$(mktemp -d)"
          cp -r kubernetes/overlays/gcp/. "$OVERLAY_TMP/"
          cat > "$OVERLAY_TMP/params.env" <<EOF
          AR_IMAGE=${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/ntp-server/ntp-server:${{ github.sha }}
          STATIC_IP_NAME=${STATIC_IP_NAME}
          GCP_WORKLOAD_SA=${GCP_CLUSTER_NAME}-workload@${GCP_PROJECT_ID}.iam.gserviceaccount.com
          EOF
          sed -i 's/^[[:space:]]*//' "$OVERLAY_TMP/params.env"
          kubectl apply -k "$OVERLAY_TMP"

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/ntp-server -n ntp-server --timeout=300s
